<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auxílio Secretaria · Unopar</title>
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0A2342;  /* Novo azul refinado */
            --secondary: #FF6B35;
            --accent: #00A86B;
            --background: #FFFFFF;
            --surface: #F5F7FA;
            --text: #2C3E50;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #1E3A5F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .splash-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
        }

        .logo-wrapper {
            background: rgba(255, 255, 255, 0.95);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-icon {
            font-size: 4rem;
            color: var(--primary);
            filter: drop-shadow(0 2px 4px rgba(10,35,66,0.2));
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .polo-badge {
            background: var(--secondary);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            margin-bottom: 3rem;
            box-shadow: 0 4px 12px rgba(255,107,53,0.3);
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 2rem auto;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: var(--secondary);
            border-radius: 10px;
            animation: load 2s ease-in-out forwards;
        }

        @keyframes load {
            to { width: 100%; }
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 2rem;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .logo-wrapper {
                width: 100px;
                height: 100px;
            }
            
            .logo-icon {
                font-size: 3rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .polo-badge {
                font-size: 0.9rem;
                padding: 0.4rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <i class="fas fa-graduation-cap logo-icon"></i>
        </div>
        
        <h1>Auxílio Secretaria</h1>
        <div class="subtitle">Unopar · Suporte Acadêmico</div>
        
        <div class="polo-badge">
            <i class="fas fa-map-pin" style="margin-right: 8px;"></i>
            Polo Santo Antônio
        </div>
        
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
        
        <div class="footer-text">
            <i class="fas fa-shield-alt" style="margin-right: 6px;"></i>
            Ambiente interno · Apenas para equipe
        </div>
    </div>

    <script>
        // Redirecionar após 2.5 segundos
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2500);
    </script>
</body>
</html>
