<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Contatos · Auxílio Secretaria</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <!-- Fontes e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0A2342;
            --primary-light: #1E3A5F;
            --secondary: #FF6B35;
            --secondary-light: #FF8A5C;
            --bg: #FFF9F5;
            --surface: #FFFFFF;
            --text: #2D3E50;
            --text-soft: #5A6B7A;
            --text-light: #8A9AA8;
            --border: #FFE4D6;
            --shadow-sm: 0 4px 12px rgba(255, 107, 53, 0.05);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        *::-webkit-scrollbar {
            display: none;
        }

        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            padding: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        @media (min-width: 500px) {
            .header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 0.6rem 1rem;
            }
        }

        @media (min-width: 768px) {
            .header {
                padding: 0.8rem 1.5rem;
            }
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        @media (min-width: 500px) {
            .header-top {
                width: auto;
            }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            box-shadow: 0 6px 12px rgba(10, 35, 66, 0.15);
        }

        .brand-text h1 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .brand-text p {
            font-size: 0.65rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .back-btn-mobile {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.8rem;
            background: var(--bg);
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-soft);
            border: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
        }

        @media (min-width: 500px) {
            .back-btn-mobile {
                display: none;
            }
        }

        .search-section {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @media (min-width: 500px) {
            .search-section {
                width: auto;
                min-width: 280px;
                max-width: 400px;
            }
        }

        .search-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 50px;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            transition: all 0.2s;
            min-width: 0;
        }

        .search-wrapper:focus-within {
            border-color: var(--secondary);
            background: white;
            box-shadow: var(--shadow-sm);
        }

        .search-wrapper i {
            color: var(--text-light);
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .search-wrapper input {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            padding: 0.5rem 0.3rem;
            outline: none;
            color: var(--text);
            width: 100%;
        }

        .search-wrapper input::placeholder {
            color: var(--text-light);
        }

        .clear-search-btn {
            background: none;
            border: none;
            color: var(--text-light);
            padding: 0.5rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
            display: none;
            align-items: center;
            gap: 0.2rem;
            flex-shrink: 0;
        }

        .clear-search-btn:hover {
            color: var(--secondary);
        }

        .back-btn-desktop {
            display: none;
            align-items: center;
            gap: 0.3rem;
            padding: 0.5rem 1rem;
            background: var(--bg);
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-soft);
            border: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        @media (min-width: 500px) {
            .back-btn-desktop {
                display: flex;
            }
        }

        .back-btn-desktop i,
        .back-btn-mobile i {
            color: var(--secondary);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
        }

        @media (min-width: 768px) {
            .main-content {
                padding: 1rem;
            }
        }

        .page {
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border-radius: 18px;
            border: 2px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            padding: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--border);
            background: rgba(255, 107, 53, 0.02);
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .card-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--primary);
        }

        .card-header h3 i {
            color: var(--secondary);
            font-size: 1rem;
            background: rgba(255, 107, 53, 0.1);
            padding: 0.2rem;
            border-radius: 8px;
        }

        .btn-add {
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text-soft);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-add:hover {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .card-content {
            padding: 0;
        }

        .loading-skeleton {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            padding: 0.8rem;
        }

        @media (min-width: 640px) {
            .loading-skeleton {
                grid-template-columns: repeat(3, 1fr);
                padding: 1rem;
            }
        }

        @media (min-width: 768px) {
            .loading-skeleton {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .loading-skeleton {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .skeleton-card {
            background: linear-gradient(90deg, var(--bg) 25%, #ffe4d6 50%, var(--bg) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            height: 130px;
            border-radius: 14px;
            border: 2px solid var(--border);
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .contatos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            padding: 0.8rem;
        }

        @media (min-width: 480px) {
            .contatos-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 640px) {
            .contatos-grid {
                grid-template-columns: repeat(3, 1fr);
                padding: 1rem;
            }
        }

        @media (min-width: 768px) {
            .contatos-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .contatos-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        @media (min-width: 1280px) {
            .contatos-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        @media (min-width: 1536px) {
            .contatos-grid {
                grid-template-columns: repeat(7, 1fr);
            }
        }

        .contato-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.4rem;
            padding: 0.7rem 0.4rem;
            background: var(--bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
            height: 100%;
        }

        .contato-card:hover {
            border-color: var(--secondary);
            background: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .contato-icone {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .contato-info {
            width: 100%;
        }

        .contato-nome {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--primary);
            margin-bottom: 0.1rem;
            word-break: break-word;
        }

        .contato-desc {
            font-size: 0.65rem;
            color: var(--text-light);
            margin-bottom: 0.1rem;
            word-break: break-word;
        }

        .contato-phone {
            font-weight: 600;
            color: var(--secondary);
            font-size: 0.7rem;
            margin-bottom: 0.2rem;
            word-break: break-word;
        }

        .contato-actions {
            display: flex;
            gap: 0.3rem;
            justify-content: center;
        }

        .contato-edit,
        .contato-wpp {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
        }

        .contato-edit {
            background: var(--bg);
            color: var(--text-soft);
            border: 1px solid var(--border);
        }

        .contato-edit:hover {
            background: var(--secondary);
            color: white;
        }

        .contato-wpp {
            background: #25D366;
            color: white;
        }

        .contato-wpp:hover {
            background: #128C7E;
            transform: scale(1.1);
        }

        .search-info {
            padding: 0.8rem 0.8rem 0 0.8rem;
            font-size: 0.75rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            background: transparent;
        }

        @media (min-width: 768px) {
            .search-info {
                padding: 1rem 1.2rem 0 1.2rem;
            }
        }

        .count-badge {
            background: var(--secondary);
            color: white;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.65rem;
            margin-left: 0.3rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            padding: 0.5rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 1.2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 2px solid var(--border);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .modal-field {
            margin-bottom: 0.8rem;
        }

        .modal-field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            color: var(--text-soft);
        }

        .modal-field input {
            width: 100%;
            padding: 0.6rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.8rem;
            font-family: 'Quicksand', sans-serif;
        }

        .icones-seletor {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.3rem;
            margin-top: 0.2rem;
            max-height: 120px;
            overflow-y: auto;
        }

        .icone-opcao {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            background: var(--bg);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            color: var(--primary);
        }

        .icone-opcao:hover {
            border-color: var(--secondary);
            background: white;
        }

        .icone-opcao.selecionado {
            border-color: var(--secondary);
            background: var(--secondary);
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .modal-btn {
            flex: 1;
            min-width: 80px;
            padding: 0.6rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
        }

        .modal-btn.primary {
            background: var(--secondary);
            color: white;
        }

        .modal-btn.primary:hover {
            background: var(--secondary-light);
            transform: translateY(-2px);
        }

        .modal-btn.secondary {
            background: var(--bg);
            color: var(--text-soft);
        }

        .modal-btn.danger {
            background: #FEE2E2;
            color: #DC2626;
        }

        .modal-btn.danger:hover {
            background: #DC2626;
            color: white;
        }

        /* ========== RESPONSIVIDADE PARA CELULAR (ATÉ 600px) ========== */
@media (max-width: 600px) {
    /* Ajustes gerais de padding e margin */
    .main-content {
        padding: 0.5rem !important;
    }
    
    .card-header {
        padding: 0.8rem !important;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
    }
    
    .card-content {
        padding: 0.8rem !important;
    }
    
    /* Ajusta textos */
    .brand-text h1 {
        font-size: 0.9rem;
    }
    
    .brand-text p {
        font-size: 0.6rem;
    }
}
    </style>
</head>

<body>
    <div class="app">
        <header class="header">
            <div class="header-top">
                <div class="brand">
                    <div class="brand-icon">
                        <i class="fas fa-address-book"></i>
                    </div>
                    <div class="brand-text">
                        <h1>Contatos</h1>
                        <p>Secretaria Unopar</p>
                    </div>
                </div>
                <a href="dashboard.html" class="back-btn-mobile">
                    <i class="fas fa-arrow-left"></i>
                    <span>Voltar</span>
                </a>
            </div>

            <div class="search-section">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Pesquisar contato...">
                    <button class="clear-search-btn" id="clearSearchBtn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <a href="dashboard.html" class="back-btn-desktop">
                    <i class="fas fa-arrow-left"></i>
                    <span>Voltar</span>
                </a>
            </div>
        </header>

        <main class="main-content">
            <div class="page">
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-address-book"></i>
                            Meus Contatos
                            <span class="count-badge" id="contactCount">0</span>
                        </h3>
                        <button class="btn-add" onclick="openAddContactModal()">
                            <i class="fas fa-plus"></i> Adicionar
                        </button>
                    </div>

                    <div class="search-info" id="searchInfo" style="display: none;">
                        <span id="searchResultText"></span>
                    </div>

                    <div class="card-content">
                        <div class="loading-skeleton" id="loadingSkeleton">
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                        </div>

                        <div class="contatos-grid" id="contactsGrid" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="contactModal">
        <div class="modal-content">
            <h3 id="contactModalTitle">Adicionar Contato</h3>
            <input type="hidden" id="contactId">
            <div class="modal-field">
                <label>Nome *</label>
                <input type="text" id="contactNome" placeholder="Ex: Financeiro">
            </div>
            <div class="modal-field">
                <label>Descrição</label>
                <input type="text" id="contactDesc" placeholder="Ex: Boletos, mensalidades">
            </div>
            <div class="modal-field">
                <label>Telefone *</label>
                <input type="text" id="contactPhone" placeholder="Ex: 79 99806-2323">
            </div>
            <div class="modal-field">
                <label>Ícone</label>
                <div class="icones-seletor" id="contactIconSelector">
                    <div class="icone-opcao" onclick="selectContactIcon('fa-dollar-sign', this)" data-icon="fa-dollar-sign"><i class="fas fa-dollar-sign"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-handshake', this)" data-icon="fa-handshake"><i class="fas fa-handshake"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-headset', this)" data-icon="fa-headset"><i class="fas fa-headset"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-graduation-cap', this)" data-icon="fa-graduation-cap"><i class="fas fa-graduation-cap"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-chalkboard-teacher', this)" data-icon="fa-chalkboard-teacher"><i class="fas fa-chalkboard-teacher"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-building', this)" data-icon="fa-building"><i class="fas fa-building"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-user', this)" data-icon="fa-user"><i class="fas fa-user"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-phone', this)" data-icon="fa-phone"><i class="fas fa-phone"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-envelope', this)" data-icon="fa-envelope"><i class="fas fa-envelope"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-whatsapp', this)" data-icon="fa-whatsapp"><i class="fab fa-whatsapp"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-clock', this)" data-icon="fa-clock"><i class="fas fa-clock"></i></div>
                    <div class="icone-opcao" onclick="selectContactIcon('fa-calendar', this)" data-icon="fa-calendar"><i class="fas fa-calendar"></i></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeContactModal()">Cancelar</button>
                <button class="modal-btn primary" onclick="saveContact()">Salvar</button>
                <button class="modal-btn danger" id="contactDeleteBtn" style="display: none;" onclick="deleteContact()">Excluir</button>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCaaUN8W88VLQc6DDEjj-BMmQ-BDQH0qAU",
            authDomain: "secretaria-unopar.firebaseapp.com",
            projectId: "secretaria-unopar",
            storageBucket: "secretaria-unopar.firebasestorage.app",
            messagingSenderId: "61660974393",
            appId: "1:61660974393:web:fb364a60897c5f35922ce8",
            measurementId: "G-CH993KHKQD"
        };

        // Inicializa Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Variáveis globais
        let contatos = [];
        let contatosFiltrados = [];
        let currentContactId = null;
        let selectedContactIcon = 'fa-user';
        let searchTimeout;

        // ===== FUNÇÃO DE PESQUISA CORRIGIDA =====
        function filtrarContatos() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;
            
            const termo = searchInput.value.toLowerCase().trim();
            
            // Se não tem termo de busca, mostra todos
            if (termo === '') {
                contatosFiltrados = [...contatos];
                document.getElementById('clearSearchBtn').style.display = 'none';
                document.getElementById('searchInfo').style.display = 'none';
            } else {
                // Filtra os contatos
                contatosFiltrados = contatos.filter(contato => {
                    const nome = (contato.nome || '').toLowerCase();
                    const desc = (contato.desc || '').toLowerCase();
                    const telefone = (contato.phone || '').toLowerCase();
                    
                    return nome.includes(termo) || 
                           desc.includes(termo) || 
                           telefone.includes(termo);
                });
                
                // Mostra informações da pesquisa
                document.getElementById('clearSearchBtn').style.display = 'flex';
                document.getElementById('searchInfo').style.display = 'flex';
                document.getElementById('searchResultText').innerHTML = 
                    `<i class="fas fa-search"></i> ${contatosFiltrados.length} resultado(s) para "${termo}"`;
            }
            
            // Atualiza a contagem e renderiza
            document.getElementById('contactCount').innerText = contatosFiltrados.length;
            renderizarContatos(contatosFiltrados);
        }

        // Função para renderizar contatos
        function renderizarContatos(lista) {
            const grid = document.getElementById('contactsGrid');
            if (!grid) return;
            
            if (!lista || lista.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; padding:2rem; font-size:0.8rem; color:var(--text-light);">Nenhum contato encontrado</p>';
                return;
            }

            let html = '';
            lista.forEach(contato => {
                const telefoneLimpo = (contato.phone || '').replace(/\D/g, '');
                html += `
                    <div class="contato-card">
                        <div class="contato-icone"><i class="fas ${contato.icon || 'fa-user'}"></i></div>
                        <div class="contato-info">
                            <div class="contato-nome">${contato.nome || ''}</div>
                            <div class="contato-desc">${contato.desc || ''}</div>
                            <div class="contato-phone">${contato.phone || ''}</div>
                        </div>
                        <div class="contato-actions">
                            <div class="contato-edit" onclick="event.stopPropagation(); editarContato('${contato.id}')">
                                <i class="fas fa-pen"></i>
                            </div>
                            <div class="contato-wpp" onclick="event.stopPropagation(); window.open('https://wa.me/55${telefoneLimpo}', '_blank')">
                                <i class="fab fa-whatsapp"></i>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // Função para carregar contatos
        async function carregarContatos() {
            const loading = document.getElementById('loadingSkeleton');
            const grid = document.getElementById('contactsGrid');
            
            if (loading) loading.style.display = 'grid';
            if (grid) grid.style.display = 'none';

            try {
                const snapshot = await db.collection('contatos').get();
                contatos = [];
                
                snapshot.forEach(doc => {
                    contatos.push({ 
                        id: doc.id, 
                        ...doc.data() 
                    });
                });

                // Ordena por nome
                contatos.sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
                contatosFiltrados = [...contatos];

                // Atualiza a contagem
                document.getElementById('contactCount').innerText = contatos.length;
                
                // Esconde loading e mostra grid
                if (loading) loading.style.display = 'none';
                if (grid) {
                    grid.style.display = 'grid';
                    renderizarContatos(contatos);
                }
                
            } catch (error) {
                console.error('Erro:', error);
                if (loading) loading.style.display = 'none';
                if (grid) {
                    grid.style.display = 'grid';
                    grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; padding:2rem; color:#DC2626;">Erro ao carregar contatos</p>';
                }
            }
        }

        // ===== EVENT LISTENERS =====
        document.addEventListener('DOMContentLoaded', function() {
            carregarContatos();
            
            // Adiciona evento de input para pesquisa
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', filtrarContatos);
            }
            
            // Adiciona evento para botão de limpar
            const clearBtn = document.getElementById('clearSearchBtn');
            if (clearBtn) {
                clearBtn.addEventListener('click', function() {
                    const input = document.getElementById('searchInput');
                    if (input) {
                        input.value = '';
                        filtrarContatos();
                        input.focus();
                    }
                });
            }
        });

        // ===== FUNÇÕES DO MODAL =====
        window.openAddContactModal = function() {
            currentContactId = null;
            document.getElementById('contactModalTitle').innerText = 'Adicionar Contato';
            document.getElementById('contactId').value = '';
            document.getElementById('contactNome').value = '';
            document.getElementById('contactDesc').value = '';
            document.getElementById('contactPhone').value = '';
            document.getElementById('contactDeleteBtn').style.display = 'none';
            selectedContactIcon = 'fa-user';

            document.querySelectorAll('#contactIconSelector .icone-opcao').forEach(icone => icone.classList.remove('selecionado'));
            const userIcon = document.querySelector('#contactIconSelector [data-icon="fa-user"]');
            if (userIcon) userIcon.classList.add('selecionado');

            document.getElementById('contactModal').classList.add('active');
        };

        window.editarContato = function(id) {
            const contato = contatos.find(c => c.id === id);
            if (contato) {
                currentContactId = id;
                document.getElementById('contactModalTitle').innerText = 'Editar Contato';
                document.getElementById('contactId').value = id;
                document.getElementById('contactNome').value = contato.nome || '';
                document.getElementById('contactDesc').value = contato.desc || '';
                document.getElementById('contactPhone').value = contato.phone || '';
                document.getElementById('contactDeleteBtn').style.display = 'block';
                selectedContactIcon = contato.icon || 'fa-user';

                document.querySelectorAll('#contactIconSelector .icone-opcao').forEach(icone => icone.classList.remove('selecionado'));
                const iconeEl = document.querySelector(`#contactIconSelector [data-icon="${contato.icon || 'fa-user'}"]`);
                if (iconeEl) iconeEl.classList.add('selecionado');

                document.getElementById('contactModal').classList.add('active');
            }
        };

        window.closeContactModal = function() {
            document.getElementById('contactModal').classList.remove('active');
        };

        window.selectContactIcon = function(icon, element) {
            selectedContactIcon = icon;
            document.querySelectorAll('#contactIconSelector .icone-opcao').forEach(icone => icone.classList.remove('selecionado'));
            element.classList.add('selecionado');
        };

        window.saveContact = async function() {
            const nome = document.getElementById('contactNome').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();

            if (!nome) {
                alert('Por favor, preencha o nome do contato');
                return;
            }

            if (!phone) {
                alert('Por favor, preencha o telefone');
                return;
            }

            const data = {
                nome: nome,
                desc: document.getElementById('contactDesc').value.trim(),
                phone: phone,
                icon: selectedContactIcon,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (currentContactId) {
                    await db.collection('contatos').doc(currentContactId).update(data);
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('contatos').add(data);
                }
                closeContactModal();
            } catch (error) {
                alert('Erro ao salvar: ' + error.message);
            }
        };

        window.deleteContact = async function() {
            if (currentContactId && confirm('Tem certeza que deseja excluir este contato?')) {
                try {
                    await db.collection('contatos').doc(currentContactId).delete();
                    closeContactModal();
                } catch (error) {
                    alert('Erro ao excluir: ' + error.message);
                }
            }
        };

        // Atalho de teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeContactModal();
            }
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>


</html>
